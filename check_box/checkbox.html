<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>check box</title>
    <link rel="stylesheet" href="checkbox.css">
</head>
<body>
    <div class="container">
        <input type="checkbox" id="mycheckbox">
        <label for="mycheckbox">Subscribe<br>
            <ul>
                <li>2 Screens</li>
                <li>HD Quality</li>
                <li>No Ads</li>
            </ul>
        </label><br><br>
        <input type="radio" id="UPIbtn" name="mode">
        <label for="UPIbtn">UPI</label><br>
        <input type="radio" id="cardbtn" name="mode">
        <label for="cardbtn">Card</label><br>
        <input type="radio" id="rupaybtn" name="mode">
        <label for="rupaybtn">Rupay</label><br><br>

        <button type="submit" id="mysubmit">Continue</button><br><br>

        <p id="moderesult"></p>
        <p id="paymentresult"></p>
    </div>
    

    <script src="checkbox.js"></script>
</body>
</html>
